<body>

        <h1>Entrada, processamento e saída</h1>

        </form>
        <button id="juntar" onclick="juntarNome()" tabindex="3">Juntar</button>
        <p>Nome completo: (innerText) </p> <!--Só texto-->
        <p id="nomecompleto">Vai aparecer o nome completo aqui</p>
        <p>Nome completo: (innerHTML) </p>
        <p id="nomecompleto1">Vai aparecer o nome completo aqui</p>
        <p>Nome completo: (innerContent) </p>
        <p id="nomecompleto2">Vai aparecer o nome completo aqui</p>
    </div>

    <script src="js/utilidades.js"></script>
    

</body>

</html>
